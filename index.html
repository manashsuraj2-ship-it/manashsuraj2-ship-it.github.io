<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Sign-up & Admin Portal</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Sign-up Form -->
        <div id="signupSection" class="form-section active">
            <h1>Create Account</h1>
            <form id="signupForm">
                <div class="form-group">
                    <label for="name">Full Name:</label>
                    <input type="text" id="name" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number:</label>
                    <input type="tel" id="phone" placeholder="Enter your phone number" required>
                </div>

                <div class="form-group">
                    <label for="address">Address:</label>
                    <input type="text" id="address" placeholder="Enter your address" required>
                </div>

                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" placeholder="Create a password" required>
                </div>

                <button type="submit" class="btn btn-primary">Sign Up</button>
            </form>

            <p class="toggle-text">Already have an account? <a href="#" onclick="toggleForm('login'); return false;">Login here</a></p>
            <p class="toggle-text"><a href="#" onclick="toggleForm('admin'); return false;">Admin Panel</a></p>
        </div>

        <!-- Login Form -->
        <div id="loginSection" class="form-section">
            <h1>User Login</h1>
            <form id="loginForm">
                <div class="form-group">
                    <label for="loginEmail">Email:</label>
                    <input type="email" id="loginEmail" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="loginPassword">Password:</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn btn-primary">Login</button>
            </form>

            <p class="toggle-text">Don't have an account? <a href="#" onclick="toggleForm('signup'); return false;">Sign up here</a></p>
        </div>

        <!-- Admin Panel (Password Protected) -->
        <div id="adminSection" class="form-section">
            <h1>Admin Panel</h1>
            <form id="adminPasswordForm">
                <div class="form-group">
                    <label for="adminPassword">Admin Password:</label>
                    <input type="password" id="adminPassword" placeholder="Enter admin password" required>
                </div>
                <button type="submit" class="btn btn-primary">Access Admin Panel</button>
            </form>
            <p class="toggle-text"><a href="#" onclick="toggleForm('signup'); return false;">Back to Sign up</a></p>
        </div>

        <!-- Admin Dashboard -->
        <div id="adminDashboard" class="form-section">
            <div class="admin-header">
                <h1>Admin Dashboard</h1>
                <button class="btn btn-logout" onclick="logoutAdmin()">Logout</button>
            </div>

            <div class="admin-stats">
                <div class="stat-card">
                    <h3>Total Users</h3>
                    <p id="totalUsers">0</p>
                </div>
            </div>

            <div class="admin-content">
                <h2>User Data</h2>
                <input type="text" id="searchInput" placeholder="Search users..." class="search-box">
                
                <table class="users-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Address</th>
                            <th>Signup Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                        <!-- Users will be populated here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
